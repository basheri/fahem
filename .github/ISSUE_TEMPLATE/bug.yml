name: Bug report
description: Report reproducible incorrect behavior without sensitive content
title: "fix: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach real student PDFs, API keys, prompts, or private document text.
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction using synthetic data
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: [Low, Medium, High, Critical]
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and commit
    validations:
      required: true
