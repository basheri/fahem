# Local development stack for Fahem AI.
# Start with: make dev   (docker compose -f infra/docker-compose.yml up --build)
# Copy .env.example to .env at the repo root before starting.
#
# This file is for LOCAL development only. Production uses managed Postgres/Redis/object
# storage, restricted egress, and least-privilege identities (see docs/13_DEPLOYMENT_AND_OPERATIONS.md).

name: fahem

services:
  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://fahem:replace-local-password@postgres:5432/fahem
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: infra/worker.Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://fahem:replace-local-password@postgres:5432/fahem
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fahem
      POSTGRES_USER: fahem
      POSTGRES_PASSWORD: replace-local-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fahem -d fahem"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: replace-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
